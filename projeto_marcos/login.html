<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Barbearia SMD</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo-link">
            <img src="logo.png" alt="Logo SMD Barbearia" width="100" height="70">
        </a>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h1>💈 Login Barbearia SMD</h1>
            <h1>👤</h1>
            <form action="login_ok.html" method="GET">
                <input type="text" name="usuario" placeholder="Digite seu nome" required>
                <input type="email" name="email" placeholder="Digite seu email" required>
                <input type="password" name="senha" placeholder="Digite sua senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>
</body>

</html>
